services:
  # Hosted mode — server owns the Clerk key
  clerk-mcp-hosted:
    build: .
    ports:
      - "3000:3000"
    environment:
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}

  # Public mode — users pass their own key via X-Clerk-Secret-Key header
  clerk-mcp-public:
    build: .
    ports:
      - "3001:3000"
    # No CLERK_SECRET_KEY set — users must provide it per-request
